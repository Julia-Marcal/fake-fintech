<c-card class="mb-4 shadow-md w-full mt-20" [ngClass]="isDarkTheme ? 'bg-gray-800' : 'bg-white'">
    <c-card-header [ngClass]="isDarkTheme ? 'text-gray-200 bg-gray-700' : 'text-gray-800 bg-gray-50'">
        Wallet Profile
    </c-card-header>
    <c-card-body class="shadow-md w-full rounded-lg" [ngClass]="isDarkTheme ? 'bg-gray-800' : 'bg-gray-50'">
        <c-row>
            <c-row class="g-4 flex justify-center">
                <ng-container *ngFor="let wallet of wallets">
                    <c-col sm="6" xl="3" class="mx-14">
                        <div class="relative flex flex-col my-6 mx-6 shadow-sm border rounded-lg w-96 p-6"
                            [ngClass]="{
                                'bg-white border-slate-200': !isDarkTheme,
                                'bg-gray-700 border-gray-600': isDarkTheme
                            }">
                            <div class="flex items-center mb-4">
                                <h5 class="text-xl font-semibold"
                                    [ngClass]="isDarkTheme ? 'text-gray-100' : 'text-slate-800'">
                                    {{wallet.name | titlecase}}
                                </h5>
                            </div>
                            <p class="block leading-normal font-light mb-4 ml-2"
                               [ngClass]="isDarkTheme ? 'text-gray-300' : 'text-slate-600'">
                                {{wallet.description}}
                            </p>
                            <div>
                                <p class="text-lg font-bold text-green-600">
                                    {{wallet.currency}} {{wallet.balance | number:'1.2-2'}}
                                </p>
                            </div>
                        </div>
                    </c-col>
                </ng-container>
            </c-row>
        </c-row>
    </c-card-body>
</c-card>
