<c-card class="mb-4 bg-gray-600 shadow-md w-full mt-20">
    <c-card-header class="text-gray-200">
        Wallet Profile
    </c-card-header>
    <c-card-body class="bg-gray-800 shadow-md w-full rounded-lg">
        <c-row>
            <c-row class="g-4">
                <c-col sm="6" xl="3" *ngFor="let wallet of wallets">
                    <c-widget-stat-a [title]="wallet.name | titlecase" color="info">
                        <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
                            <span>{{ wallet.currency }} {{ wallet.balance | number:'1.2-2' }}</span>
                            <span class="fw-normal" style="font-size: 12px;">
                                {{ wallet.description }}
                            </span>
                        </ng-template>
                        <ng-template cTemplateId="widgetActionTemplate">
                            <c-dropdown alignment="end" variant="btn-group">
                                <button [caret]="false" cButton cDropdownToggle class="p-0 text-white"
                                    color="transparent" aria-label="Open dropdown">
                                    <svg cIcon name="cilOptions"></svg>
                                </button>
                                <ul cDropdownMenu>
                                    <li><a [routerLink]="[]" cDropdownItem>View Details</a></li>
                                    <li><a [routerLink]="[]" cDropdownItem>Add Funds</a></li>
                                    <li><a [routerLink]="[]" cDropdownItem>Transfer</a></li>
                                    <li><a [routerLink]="[]" cDropdownItem>Settings</a></li>
                                </ul>
                            </c-dropdown>
                        </ng-template>
                        <ng-template cTemplateId="widgetChartTemplate">
                            <c-chart [data]="data[1]" [options]="options[1]" class="mt-3 mx-3" height="70"
                                type="line" />
                        </ng-template>
                    </c-widget-stat-a>
                </c-col>
            </c-row>
        </c-row>
    </c-card-body>
</c-card>
